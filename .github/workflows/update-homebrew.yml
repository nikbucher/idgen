name: Update Homebrew Formula

on:
  workflow_run:
    workflows: [ "Release" ]
    types: [ completed ]

jobs:
  update-formula:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    runs-on: ubuntu-latest

    steps:
      - name: Get release info
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.workflow_run.head_branch }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          DOWNLOAD_BASE="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          for target in aarch64-apple-darwin x86_64-apple-darwin aarch64-unknown-linux-gnu x86_64-unknown-linux-gnu; do
            URL="$DOWNLOAD_BASE/idgen-${target}.tar.gz"
            SHA=$(gh release download "$TAG" --repo "${{ github.repository }}" --pattern "idgen-${target}.tar.gz" --output - | sha256sum | cut -d' ' -f1)
            KEY=$(echo "$target" | tr '-' '_')
            echo "url_${KEY}=$URL" >> "$GITHUB_OUTPUT"
            echo "sha_${KEY}=$SHA" >> "$GITHUB_OUTPUT"
          done

      - name: Checkout homebrew-tap
        uses: actions/checkout@v6
        with:
          repository: nikbucher/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_PAT }}

      - name: Update formula
        env:
          VERSION: ${{ steps.release.outputs.version }}
          URL_AARCH64_APPLE: ${{ steps.release.outputs.url_aarch64_apple_darwin }}
          SHA_AARCH64_APPLE: ${{ steps.release.outputs.sha_aarch64_apple_darwin }}
          URL_X86_64_APPLE: ${{ steps.release.outputs.url_x86_64_apple_darwin }}
          SHA_X86_64_APPLE: ${{ steps.release.outputs.sha_x86_64_apple_darwin }}
          URL_AARCH64_LINUX: ${{ steps.release.outputs.url_aarch64_unknown_linux_gnu }}
          SHA_AARCH64_LINUX: ${{ steps.release.outputs.sha_aarch64_unknown_linux_gnu }}
          URL_X86_64_LINUX: ${{ steps.release.outputs.url_x86_64_unknown_linux_gnu }}
          SHA_X86_64_LINUX: ${{ steps.release.outputs.sha_x86_64_unknown_linux_gnu }}
        run: |
          cat > Formula/idgen.rb << RUBY
          class Idgen < Formula
            desc "CLI tool for generating random NanoID-style identifiers"
            homepage "https://github.com/nikbucher/idgen"
            version "$VERSION"
            license "MIT"

            on_macos do
              on_arm do
                url "$URL_AARCH64_APPLE"
                sha256 "$SHA_AARCH64_APPLE"
              end
              on_intel do
                url "$URL_X86_64_APPLE"
                sha256 "$SHA_X86_64_APPLE"
              end
            end

            on_linux do
              on_arm do
                url "$URL_AARCH64_LINUX"
                sha256 "$SHA_AARCH64_LINUX"
              end
              on_intel do
                url "$URL_X86_64_LINUX"
                sha256 "$SHA_X86_64_LINUX"
              end
            end

            def install
              bin.install "idgen"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/idgen --version")
            end
          end
          RUBY
          sed -i 's/^          //' Formula/idgen.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/idgen.rb
          git commit -m "feat: update idgen to ${{ steps.release.outputs.version }}"
          git push
