name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  completions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build (native)
        run: cargo build --release
      - name: Generate completion scripts
        run: |
          mkdir -p completions
          ./target/release/idgen --completions bash       > completions/idgen.bash
          ./target/release/idgen --completions zsh        > completions/_idgen
          ./target/release/idgen --completions fish       > completions/idgen.fish
          ./target/release/idgen --completions powershell > completions/idgen.ps1
          ./target/release/idgen --completions elvish     > completions/idgen.elv
      - uses: actions/upload-artifact@v7
        with:
          name: idgen-completions
          path: completions/

  build:
    needs: completions
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            archive: zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Download completions
        uses: actions/download-artifact@v8
        with:
          name: idgen-completions
          path: completions/

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          STAGE=$(mktemp -d)
          cp target/${{ matrix.target }}/release/idgen "$STAGE/"
          cp -r completions "$STAGE/"
          tar czf idgen-${{ matrix.target }}.tar.gz -C "$STAGE" .

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $stage = New-Item -ItemType Directory -Path (Join-Path $env:RUNNER_TEMP "stage")
          Copy-Item "target/${{ matrix.target }}/release/idgen.exe" $stage
          Copy-Item -Recurse "completions" $stage
          Compress-Archive -Path "$stage/*" -DestinationPath "idgen-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: idgen-${{ matrix.target }}
          path: idgen-${{ matrix.target }}.${{ matrix.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
